<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Jakub Wiśniewski developer portfolio social preview</title>
  <desc id="desc">A social preview card with graph-inspired visuals and copy focused on backend systems, machine learning workflows, and data analytics.</desc>
